<!DOCTYPE html>
<html>

<head>
    <title>Mr.HaslamBrock</title>
    <style>
        body {
            background-color: rgb(227, 141, 36);
            color: rgb(6, 28, 116);

        }

        .heading {
            color: black;
            font-weight: bolder;
            font-style: italic;
        }

        #favorite_food {
            color: red;
        }
    </style>
</head>

<body>
    <h1 class="heading">My Favorite Things</h1>
    <!-- Unordered List Example: -->
    <h2 class="heading">Favorite Foods</h2>
    <ul>
        <li>Pizza</li>
        <li>Curry</li>
        <li id="favorite_food">Shrimp</li>
    </ul>
    <!--Ordered List Example: -->
    <h2 class="heading">Favorite Movies</h2>
    <ol>
        <li>Big Sick</li>
        <li>Wayne's World</li>
        <li>Lord of the Rings</li>
    </ol>
    <!--Table Example: -->
    <h2 class="heading">Favorite Musicians</h2>
    <table border="1px">
        <tr>
            <th>Names</th>
            <th>Instrument</th>
            <th>Band</th>
        </tr>
        <tr>
            <td>Paul McCartney</td>
            <td>Bass</td>
            <td>The Beatles</td>
        </tr>
        <tr>
            <td>Johnny Marr</td>
            <td>Guitar</td>
            <td>The Smiths</td>
        </tr>
        <tr>
            <td>John Bohnam</td>
            <td>Drums</td>
            <td>Led Zeppelin</td>
        </tr>
    </table>
</body>

</html>
